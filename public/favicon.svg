<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Buch/Wissen Icon mit CodeBack Green -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  
  <!-- Buchform -->
  <path d="M20 16 C20 12, 24 8, 32 8 L96 8 C104 8, 108 12, 108 16 L108 112 C108 116, 104 120, 96 120 L32 120 C24 120, 20 116, 20 112 Z" fill="url(#grad)"/>
  
  <!-- Buchrücken -->
  <path d="M20 16 L20 112 C20 116, 24 120, 32 120 L32 8 C24 8, 20 12, 20 16 Z" fill="#16a34a"/>
  
  <!-- Seiten -->
  <rect x="36" y="20" width="60" height="4" rx="2" fill="rgba(255,255,255,0.9)"/>
  <rect x="36" y="32" width="60" height="4" rx="2" fill="rgba(255,255,255,0.7)"/>
  <rect x="36" y="44" width="60" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
  
  <!-- W für Wissen -->
  <text x="64" y="95" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">W</text>
  
  <style>
    @media (prefers-color-scheme: dark) {
      path:first-of-type { fill: url(#grad); }
    }
  </style>
</svg>